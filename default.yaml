lseg_fetch:
  query: "Language:LJA AND Source:RTRS"
  start: "2024-01-01T00:00:00Z"
  end: "2024-12-31T23:59:59Z"
  count: 100
  order_by: "new_to_old"
  chunk_days: 7
  cache_dir: "data/raw/headlines"
  force_refresh: false

preprocess:
  low_information_mode: "drop"
  min_headline_chars: 8

dedup:
  similarity_threshold: 0.92
  window_hours: 24

embedding:
  model_name: "paraphrase-multilingual-MiniLM-L12-v2"
  normalize_embeddings: true
  batch_size: 64
  headline_cache_path: "data/processed/headline_embeddings.parquet"

topic_model:
  top_n_words: 15
  top_n_headlines: 10
  fit_start: null
  fit_end: null
  umap_n_neighbors: 15
  umap_n_components: 5
  umap_min_dist: 0.0
  umap_metric: "cosine"
  random_state: 42
  hdbscan_min_cluster_size: 30
  hdbscan_metric: "euclidean"
  hdbscan_cluster_selection_method: "eom"
  calculate_probabilities: true
  language: "multilingual"

topic_intensity:
  weekly_rule: "W-FRI"
  ewma_span: 5
  lookback: 20
  z_threshold: 1.0
  aggregate_timezone: "Asia/Tokyo"

theme_map:
  similarity_threshold: 0.35
  top_n_themes_per_topic: 5

regression:
  model_type: "ridge"
  min_obs_per_theme: 60
  time_series_splits: 5
  ridge_alphas: [0.1, 1.0, 10.0, 100.0]
  elasticnet_alphas: [0.001, 0.01, 0.1, 1.0]
  elasticnet_l1_ratio: [0.2, 0.5, 0.8]

trend:
  trend_ewma_span: 5
  trend_lookback: 60
  surge_threshold: 2.0
  uptrend_threshold: 1.0
  persistent_threshold: 5

paths:
  theme_definitions_path: "data/raw/theme_definitions.parquet"
  theme_holdings_path: "data/raw/theme_holdings.parquet"
  prices_path: "data/raw/prices.parquet"
  market_turnover_path: null
  output_tables_dir: "outputs/tables"
  output_figures_dir: "outputs/figures"
  output_logs_dir: "outputs/logs"
